<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Admin Panel – Anajak Angkor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Khmer&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (Same as public.html but simplified for admin) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Khmer', sans-serif; background: #03030a; color: #fff; line-height: 1.5; }
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(5,5,15,0.95); backdrop-filter: blur(20px); padding: 0.6rem 4%; border-bottom: 1px solid #d4af37; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-circle { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; background: linear-gradient(135deg, #d4af37, #ffaa00); }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text h1 { font-size: 0.95rem; background: linear-gradient(135deg, #fff, #d4af37); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 0.45rem; color: #d4af37; }
        .back-link { color: #d4af37; text-decoration: none; font-size: 0.85rem; padding: 0.4rem 0.8rem; border: 1px solid #d4af37; border-radius: 40px; }
        .back-link:hover { background: #d4af37; color: #0a0a0a; }
        .container { max-width: 1200px; margin: 80px auto 2rem; padding: 0 4%; }
        .login-box { max-width: 400px; margin: 100px auto; background: rgba(20,20,35,0.6); backdrop-filter: blur(10px); padding: 2rem; border-radius: 28px; text-align: center; border: 1px solid #d4af37; }
        .login-box input { width: 100%; padding: 0.8rem; margin: 0.8rem 0; background: #1e1e2a; border: 1px solid #3a3a4a; border-radius: 14px; color: white; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; background: linear-gradient(135deg, #d4af37, #ffaa00); color: #0a0a0a; width: 100%; }
        .admin-tabs { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab-btn { padding: 0.5rem 1rem; background: #1e1e2a; border: 1px solid #d4af37; color: #d4af37; border-radius: 40px; cursor: pointer; }
        .tab-btn.active { background: #d4af37; color: #05050b; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .admin-form { background: #0a0a12; padding: 1rem; border-radius: 20px; margin-bottom: 1.5rem; }
        .admin-form h3 { margin-bottom: 0.8rem; }
        .admin-form input, .admin-form select { width: 100%; padding: 0.6rem; margin-bottom: 0.6rem; background: #1e1e2a; border: 1px solid #3a3a4a; border-radius: 12px; color: white; }
        .admin-items-grid { display: grid; grid-template-columns: 1fr; gap: 0.6rem; }
        .admin-item-card { background: #0f0f18; padding: 0.7rem; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
        .icon-btn { background: none; border: none; color: #d4af37; font-size: 1rem; padding: 0.3rem 0.5rem; cursor: pointer; }
        .icon-btn.delete { color: #dc3545; }
        .save-status { position: fixed; bottom: 15px; right: 15px; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 20px; font-size: 0.65rem; display: none; border-left: 3px solid #4caf50; }
        @media (min-width: 768px) {
            .admin-items-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="saveStatus" class="save-status">✅ Saved</div>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <div class="logo-circle"><img src="https://e.top4top.io/p_3731sfged1.jpg" alt="Logo"></div>
            <div class="logo-text"><h1>Admin Panel</h1><p>ANAJAK ANGKOR</p></div>
        </div>
        <a href="index.html" class="back-link"><i class="fas fa-eye"></i> View Site</a>
    </div>
</nav>

<div id="adminApp" class="container"></div>

<script>
    const STORAGE_KEY = 'anajak_angkor_data';

    const defaultData = {
        players: [
            { id: 1, name: "SOKHA \"GODZILLA\"", role: "Captain / Striker", stats: "🏅 8 Titles • ⚽ 245 Goals", photo: null, defaultIcon: "fa-user-ninja" },
            { id: 2, name: "RITHY \"PHANTOM\"", role: "Midfielder", stats: "🏅 6 Titles • 🎯 112 Assists", photo: null, defaultIcon: "fa-user-astronaut" },
            { id: 3, name: "VICHEKA \"SHADOW\"", role: "Defender", stats: "🏅 5 Titles • 🛡️ 89 Clean Sheets", photo: null, defaultIcon: "fa-user-secret" },
            { id: 4, name: "DARA \"WIZARD\"", role: "Goalkeeper", stats: "🏅 7 Titles • 🧤 156 Saves", photo: null, defaultIcon: "fa-user-graduate" }
        ],
        matches: [
            { id: 1, date: "Mar 25, 2026", opponent: "Phoenix Esports", result: "3 - 1 WIN", status: "win" },
            { id: 2, date: "Mar 28, 2026", opponent: "Dragon FC", result: "2 - 0 WIN", status: "win" },
            { id: 3, date: "Apr 2, 2026", opponent: "Tiger Gaming", result: "Upcoming", status: "upcoming" },
            { id: 4, date: "Apr 5, 2026", opponent: "Khmer Warriors", result: "Upcoming", status: "upcoming" }
        ],
        achievements: [
            { id: 1, title: "eFootball Cambodia Champions", year: "2025", icon: "fa-trophy" },
            { id: 2, title: "SEA Invitational Runner-up", year: "2025", icon: "fa-medal" },
            { id: 3, title: "Kingdom League Winners", year: "2024, 2025", icon: "fa-crown" },
            { id: 4, title: "Undefeated Streak Record", year: "21 Matches (2025)", icon: "fa-chart-line" }
        ],
        teamInfo: { tournamentsWon: 15, totalMatches: 45 }
    };

    let appData = { ...defaultData };
    let isLoggedIn = false;

    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                appData = JSON.parse(saved);
            } catch(e) {}
        } else {
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
        showSaveStatus();
    }

    function showSaveStatus() {
        const el = document.getElementById('saveStatus');
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2000);
    }

    // Admin actions
    function addPlayer(player) {
        const newId = Date.now();
        appData.players.push({ ...player, id: newId });
        saveData();
        refreshAdminLists();
    }

    function deletePlayer(id) {
        if (confirm('Delete this player?')) {
            appData.players = appData.players.filter(p => p.id !== id);
            saveData();
            refreshAdminLists();
        }
    }

    function addMatch(match) {
        const newId = Date.now();
        appData.matches.push({ ...match, id: newId });
        const completed = appData.matches.filter(m => m.status === 'win' || m.status === 'loss').length;
        appData.teamInfo.totalMatches = completed;
        saveData();
        refreshAdminLists();
    }

    function deleteMatch(id) {
        if (confirm('Delete this match?')) {
            appData.matches = appData.matches.filter(m => m.id !== id);
            const completed = appData.matches.filter(m => m.status === 'win' || m.status === 'loss').length;
            appData.teamInfo.totalMatches = completed;
            saveData();
            refreshAdminLists();
        }
    }

    function addAchievement(achievement) {
        const newId = Date.now();
        appData.achievements.push({ ...achievement, id: newId });
        appData.teamInfo.tournamentsWon = appData.achievements.length;
        saveData();
        refreshAdminLists();
    }

    function deleteAchievement(id) {
        if (confirm('Delete this achievement?')) {
            appData.achievements = appData.achievements.filter(a => a.id !== id);
            appData.teamInfo.tournamentsWon = appData.achievements.length;
            saveData();
            refreshAdminLists();
        }
    }

    function deleteAll(type) {
        if (confirm('Delete ALL ' + type + '? This cannot be undone.')) {
            if (type === 'players') appData.players = [];
            else if (type === 'matches') { appData.matches = []; appData.teamInfo.totalMatches = 0; }
            else if (type === 'achievements') { appData.achievements = []; appData.teamInfo.tournamentsWon = 0; }
            saveData();
            refreshAdminLists();
        }
    }

    function updateTeamInfo(tournamentsWon, totalMatches) {
        appData.teamInfo.tournamentsWon = tournamentsWon;
        appData.teamInfo.totalMatches = totalMatches;
        saveData();
        refreshAdminLists();
    }

    function uploadPhoto(playerId, base64) {
        const player = appData.players.find(p => p.id === playerId);
        if (player) {
            player.photo = base64;
            saveData();
            refreshAdminLists();
        }
    }

    // UI helpers
    function refreshAdminLists() {
        const playersList = document.getElementById('playersList');
        if (playersList) {
            playersList.innerHTML = appData.players.map(p => `
                <div class="admin-item-card">
                    <div><h4>${escapeHtml(p.name)}</h4><p>${escapeHtml(p.role)}</p></div>
                    <div>
                        <button class="icon-btn" onclick="uploadPhotoForPlayer(${p.id})"><i class="fas fa-camera"></i></button>
                        <button class="icon-btn delete" onclick="deletePlayerHandler(${p.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }
        const matchesList = document.getElementById('matchesList');
        if (matchesList) {
            matchesList.innerHTML = appData.matches.map(m => `
                <div class="admin-item-card">
                    <div><h4>${escapeHtml(m.opponent)}</h4><p>${escapeHtml(m.date)} - ${escapeHtml(m.result)}</p></div>
                    <div><button class="icon-btn delete" onclick="deleteMatchHandler(${m.id})"><i class="fas fa-trash"></i></button></div>
                </div>
            `).join('');
        }
        const achievementsList = document.getElementById('achievementsList');
        if (achievementsList) {
            achievementsList.innerHTML = appData.achievements.map(a => `
                <div class="admin-item-card">
                    <div><h4>${escapeHtml(a.title)}</h4><p>${escapeHtml(a.year)}</p></div>
                    <div><button class="icon-btn delete" onclick="deleteAchievementHandler(${a.id})"><i class="fas fa-trash"></i></button></div>
                </div>
            `).join('');
        }
        const settingsTournaments = document.getElementById('settingsTournaments');
        if (settingsTournaments) settingsTournaments.value = appData.teamInfo.tournamentsWon;
        const settingsMatches = document.getElementById('settingsMatches');
        if (settingsMatches) settingsMatches.value = appData.teamInfo.totalMatches;
    }

    function setupForms() {
        const addPlayerForm = document.getElementById('addPlayerForm');
        if (addPlayerForm) {
            addPlayerForm.onsubmit = (e) => {
                e.preventDefault();
                const photoFile = document.getElementById('playerPhoto').files[0];
                if (photoFile) {
                    const reader = new FileReader();
                    reader.readAsDataURL(photoFile);
                    reader.onload = () => {
                        addPlayer({
                            name: document.getElementById('playerName').value,
                            role: document.getElementById('playerRole').value,
                            stats: document.getElementById('playerStats').value,
                            photo: reader.result,
                            defaultIcon: "fa-user-ninja"
                        });
                        addPlayerForm.reset();
                    };
                } else {
                    addPlayer({
                        name: document.getElementById('playerName').value,
                        role: document.getElementById('playerRole').value,
                        stats: document.getElementById('playerStats').value,
                        photo: null,
                        defaultIcon: "fa-user-ninja"
                    });
                    addPlayerForm.reset();
                }
            };
        }

        const addMatchForm = document.getElementById('addMatchForm');
        if (addMatchForm) {
            addMatchForm.onsubmit = (e) => {
                e.preventDefault();
                const result = document.getElementById('matchResult').value;
                addMatch({
                    date: document.getElementById('matchDate').value,
                    opponent: document.getElementById('matchOpponent').value,
                    result: result === 'WIN' ? 'WIN' : result === 'LOSS' ? 'LOSS' : 'Upcoming',
                    status: result === 'WIN' ? 'win' : result === 'LOSS' ? 'loss' : 'upcoming'
                });
                addMatchForm.reset();
            };
        }

        const addAchievementForm = document.getElementById('addAchievementForm');
        if (addAchievementForm) {
            addAchievementForm.onsubmit = (e) => {
                e.preventDefault();
                addAchievement({
                    title: document.getElementById('achievementTitle').value,
                    year: document.getElementById('achievementYear').value,
                    icon: document.getElementById('achievementIcon').value
                });
                addAchievementForm.reset();
            };
        }

        const settingsForm = document.getElementById('settingsForm');
        if (settingsForm) {
            settingsForm.onsubmit = (e) => {
                e.preventDefault();
                updateTeamInfo(
                    parseInt(document.getElementById('settingsTournaments').value),
                    parseInt(document.getElementById('settingsMatches').value)
                );
            };
        }
    }

    function showAdminPanel() {
        const container = document.getElementById('adminApp');
        container.innerHTML = `
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('players')">Players</button>
                <button class="tab-btn" onclick="switchTab('matches')">Matches</button>
                <button class="tab-btn" onclick="switchTab('achievements')">Achievements</button>
                <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
            </div>
            <div id="playersTab" class="tab-pane active">
                <div class="admin-form"><h3>Add Player</h3><form id="addPlayerForm"><input placeholder="Name" id="playerName" required><input placeholder="Role" id="playerRole"><input placeholder="Stats" id="playerStats"><input type="file" id="playerPhoto" accept="image/*"><button class="btn" style="width:100%; margin-top:0.5rem;">Add Player</button><button type="button" class="btn" style="background:#dc3545; margin-top:0.5rem;" onclick="deleteAllHandler('players')">Delete All Players</button></form></div>
                <h3>Current Players</h3><div id="playersList"></div>
            </div>
            <div id="matchesTab" class="tab-pane">
                <div class="admin-form"><h3>Add Match</h3><form id="addMatchForm"><input placeholder="Date (e.g., Apr 10)" id="matchDate"><input placeholder="Opponent" id="matchOpponent"><select id="matchResult"><option>Upcoming</option><option>WIN</option><option>LOSS</option></select><button class="btn" style="width:100%; margin-top:0.5rem;">Add Match</button><button type="button" class="btn" style="background:#dc3545; margin-top:0.5rem;" onclick="deleteAllHandler('matches')">Delete All Matches</button></form></div>
                <h3>Current Matches</h3><div id="matchesList"></div>
            </div>
            <div id="achievementsTab" class="tab-pane">
                <div class="admin-form"><h3>Add Achievement</h3><form id="addAchievementForm"><input placeholder="Title" id="achievementTitle"><input placeholder="Year" id="achievementYear"><input placeholder="Icon (fa-trophy)" id="achievementIcon" value="fa-trophy"><button class="btn" style="width:100%; margin-top:0.5rem;">Add Achievement</button><button type="button" class="btn" style="background:#dc3545; margin-top:0.5rem;" onclick="deleteAllHandler('achievements')">Delete All Achievements</button></form></div>
                <h3>Current Achievements</h3><div id="achievementsList"></div>
            </div>
            <div id="settingsTab" class="tab-pane">
                <div class="admin-form"><h3>Team Statistics</h3><form id="settingsForm"><input type="number" id="settingsTournaments" placeholder="Tournaments Won"><input type="number" id="settingsMatches" placeholder="Total Matches"><button class="btn" style="width:100%;">Update Stats</button></form><button onclick="logout()" class="btn" style="background:#dc3545; margin-top:0.8rem;">Logout</button></div>
            </div>
        `;
        refreshAdminLists();
        setupForms();
    }

    function showLogin() {
        const container = document.getElementById('adminApp');
        container.innerHTML = `
            <div class="login-box">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="btn">Login</button>
                </form>
                <p style="margin-top:1rem; font-size:0.8rem; color:#888;">Demo: admin / admin123</p>
            </div>
        `;
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'admin' && pass === 'admin123') {
                isLoggedIn = true;
                loadData();
                showAdminPanel();
            } else {
                alert('Invalid credentials');
            }
        };
    }

    function logout() {
        isLoggedIn = false;
        showLogin();
    }

    // Global handlers
    window.deletePlayerHandler = (id) => deletePlayer(id);
    window.deleteMatchHandler = (id) => deleteMatch(id);
    window.deleteAchievementHandler = (id) => deleteAchievement(id);
    window.deleteAllHandler = (type) => deleteAll(type);
    window.uploadPhotoForPlayer = (id) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => uploadPhoto(id, reader.result);
            }
        };
        input.click();
    };
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
        if(event?.target) event.target.classList.add('active');
    };

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    showLogin();
</script>
</body>
</html>
